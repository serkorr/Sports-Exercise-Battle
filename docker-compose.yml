services:
  postgres:
    image: postgres:16
    container_name: sports-battle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sports_exercise_battle
      POSTGRES_USER: serkan
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: